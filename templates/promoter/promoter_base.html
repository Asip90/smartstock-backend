{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Espace promoteur | SmartStock{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { primaryBlue:'#1A56DB', deepNavy:'#1E3A5F', surface:'#F1F5F9', successGreen:'#16A34A', errorRed:'#DC2626', textSecondary:'#64748B', borderColor:'#E2E8F0' },
      borderRadius: { input:'12px', card:'16px' },
      fontFamily: { sans:['Poppins','sans-serif'] } } } }
  </script>
  <style>
    @keyframes pop-in { 0%{opacity:0;transform:scale(.85)} 60%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes rise { 0%{opacity:0;transform:translateY(14px)} 100%{opacity:1;transform:none} }
    @keyframes draw { to { stroke-dashoffset:0 } }
    .motion-pop { animation:pop-in .5s cubic-bezier(.2,0,0,1) both }
    .motion-rise { animation:rise .5s ease both }
    .motion-rise.d1 { animation-delay:.12s } .motion-rise.d2 { animation-delay:.24s } .motion-rise.d3 { animation-delay:.36s }
    .check-circle { width:88px;height:88px;border-radius:50%;background:#16A34A;display:flex;align-items:center;justify-content:center;margin:0 auto }
    .check-circle svg path { stroke-dasharray:48;stroke-dashoffset:48;animation:draw .5s ease .3s forwards }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="font-sans bg-surface text-deepNavy min-h-screen flex items-center justify-center px-6 py-12">
  {% block body %}{% endblock %}
</body>
</html>
